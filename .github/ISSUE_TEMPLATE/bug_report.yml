name: Bug report
description: Report a bug or unexpected behavior in Synergism
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can someone else reliably trigger this?
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
      placeholder: |
        Expected: ...
        Actual:   ...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (WASM build)
        - Desktop (Tauri)
        - Headless sim (synergismforkd-sim)
        - Not sure
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      description: For the Web (WASM) platform only. e.g. "Firefox 130", "Chrome 128".
      placeholder: e.g. Firefox 130

  - type: input
    id: save-version
    attributes:
      label: Save file version
      description: Visible in Settings or Stats. Helps with migration-related bugs.
      placeholder: e.g. 0.1.x

  - type: textarea
    id: console
    attributes:
      label: Console output
      description: Open DevTools (F12) and paste any errors. Optional but very helpful.
      render: shell
