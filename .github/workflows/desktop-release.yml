name: desktop-release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.os }}
    # Build matrix only reads source; release publishing (when Tauri
    # integration lands) moves to a separate job that gathers artifacts
    # via actions/download-artifact and holds `contents: write` alone.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: linux,   os: ubuntu-latest,  artifact: '*.deb' }
          - { name: macos,   os: macos-latest,   artifact: '*.dmg' }
          - { name: windows, os: windows-latest, artifact: '*.msi' }

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache cargo registry & target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-desktop-${{ matrix.target.name }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      # The Tauri build commands land in the follow-up Tauri-integration PR.
      # For now this workflow just builds the placeholder binary so the
      # matrix shape is wired and the tag event reliably triggers a run.
      - name: cargo build --release
        run: cargo build -p synergismforkd_ui_desktop --release

      # When Tauri wiring lands, replace the step above with:
      #   uses: tauri-apps/tauri-action@<SHA>
      #   with:
      #     projectPath: crates/synergismforkd_ui_desktop
      #     tagName: ${{ github.ref_name }}
      #     releaseName: 'Synergism Forkd ${{ github.ref_name }}'
      #     releaseBody: 'See CHANGELOG.md for release notes.'
      # And add a follow-up job with `permissions: contents: write` to
      # gather per-OS artifacts (via actions/download-artifact) and call
      # softprops/action-gh-release. Per Argus S-09 / RBP-037, the build
      # matrix should never carry write perms; only the release step
      # itself needs them.
