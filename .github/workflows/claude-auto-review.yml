name: Claude Auto Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-review:
    # Only run for first-party branches. Fork PRs don't receive secrets
    # (GitHub default), so claude-code-action fails on them; the filter
    # avoids wasting runner minutes on those failures.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Automatic PR Review
        uses: anthropics/claude-code-action@4d7e1f0cd85743fdc93b1c8040ab54395da024e2 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: "true"
          # Supplying `prompt` runs the action automatically (no @claude trigger
          # phrase needed). This is the v1 replacement for the old `direct_prompt`.
          prompt: |
            Please review this pull request and provide comprehensive feedback.

            Focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security implications
            - Test coverage
            - Documentation updates if needed

            Provide constructive feedback with specific suggestions for improvement.
            Use inline comments to highlight specific areas of concern.
          # v1 moves CLI-level options (timeout, max turns, tool allowlist, model)
          # into `claude_args`. See https://github.com/anthropics/claude-code-action
          claude_args: |
            --max-turns 30
