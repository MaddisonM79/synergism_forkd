name: Create a release for Kongregate
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # actions/attest-build-provenance signs an attestation via Sigstore
      # (id-token: write) and uploads it to the GitHub attestations API
      # (attestations: write).
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Install deps
        run: npm ci
      - name: Build
        run: |
          node ./scripts/update-last-updated.js
          npm run-script build:esbuild
      - name: Remove old .zip
        run: |
          rm -rf Kong.zip
      - name: Create .zip File
        uses: vimtor/action-zip@5f1c4aa587ea41db1110df6a99981dbe19cee310 # v1
        with:
          files: dist/ Pictures/Splash/ Pictures/Default/ Pictures/logo.png Pictures/logoLight.png Pictures/MISSINGIMAGE.png translations/ index.html Synergism.css favicon.ico
          dest: Kong.zip
          recursive: false
      - name: Attest Kong.zip
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'Kong.zip'
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Kongregate Build ${{ github.ref_name }}
          files: |
            Kong.zip
