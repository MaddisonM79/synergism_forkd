name: ci

on:
  push:
    paths-ignore:
      - '*.md'
  pull_request:
    paths-ignore:
      - '*.md'

jobs:
  test:
    # Browser-only build; production deploys to Cloudflare Pages (Linux).
    # No desktop runtime to validate. Win/macOS dropped to save ~12x CI minutes
    # per push (GitHub bills macOS at 10x, Windows at 2x Linux minutes).
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Install
        run: |
          npm ci
      - name: Check
        run: |
          npm run check:tsc
      - name: Run linter
        run: |
          npm run lint
          npm run csslint
      - name: Build
        run: |
          npm run build:esbuild
      - name: Check translation files
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: check-translation-files
        with:
          result-encoding: string
          script: |
            var fs = require('fs');
            var path = require('path');
            var { inspect } = require('util');

            function addedDiff(source, target) {
              if (target === null || typeof target !== 'object' || Array.isArray(target)) return {};
              if (source === null || typeof source !== 'object' || Array.isArray(source)) return target;
              var added = {};
              for (var key of Object.keys(target)) {
                if (!(key in source)) {
                  added[key] = target[key];
                } else if (target[key] && typeof target[key] === 'object' && !Array.isArray(target[key])) {
                  var sub = addedDiff(source[key], target[key]);
                  if (Object.keys(sub).length) added[key] = sub;
                }
              }
              return added;
            }

            var source = JSON.parse(fs.readFileSync('./packages/web_ui/translations/en.json'));
            var translations = fs.readdirSync('./packages/web_ui/translations')
              .map(f => path.join('./packages/web_ui/translations', f))
              .map(j => ({ path: j, json: JSON.parse(fs.readFileSync(j)) }));

            // Warn-only — 6 non-en files currently carry stale keys from
            // removed/renamed features; a separate cleanup PR will re-enable
            // strict failure.
            for (var json of translations) {
              var added = addedDiff(source, json.json)

              if (Object.keys(added).length) {
                console.log('::warning::Stale keys in ' + json.path)
                console.log(inspect(added, undefined, 100, true), json.path)
              }
            }
